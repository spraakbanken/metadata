example: |-
  This analysis is used with Sparv. Check out [Sparv's quick start guide](https://spraakbanken.gu.se/sparv/user-manual/quick-start/) to get started!

  To use this analysis, add the following lines under `export.annotations` in the Sparv [corpus configuration file](https://spraakbanken.gu.se/sparv/user-manual/quick-start/#creating-the-config-file):

  ```yaml
  - <sentence>:sbx_superlim.nuclear_stance  # None
  - <sentence>:sbx_superlim.nuclear_stance.certainty  # None
  ```

  You also need to install the following plugin: *sbx_superlim*.

  For general information on how to install plugins, see [here](https://spraakbanken.gu.se/sparv/user-manual/installation-and-setup/#installing-and-uninstalling-plugins).

  For more info on how to use Sparv, check out the [Sparv documentation](https://spraakbanken.gu.se/sparv).

  Example output:
  ```xml
  <sentence nuclear_stance="pro">
    <token>Ett</token>
    <token>öppet</token>
    <token>Sverige</token>
    <token>Vi</token>
    <token>lever</token>
    <token>i</token>
    <token>en</token>
    <token>orolig</token>
    <token>tid</token>
    <token>,</token>
    <token>där</token>
    <token>människor</token>
    <token>tvingas</token>
    <token>fly</token>
    <token>för</token>
    <token>sina</token>
    <token>liv</token>
    <token>från</token>
    <token>krig</token>
    <token>och</token>
    <token>förtryck</token>
    <token>.</token>
  </sentence>
  <sentence nuclear_stance="non">
    <token>Inte</token>
    <token>sedan</token>
    <token>Andra</token>
    <token>världskriget</token>
    <token>har</token>
    <token>så</token>
    <token>många</token>
    <token>människor</token>
    <token>varit</token>
    <token>på</token>
    <token>flykt</token>
    <token>.</token>
  </sentence>
  ```
