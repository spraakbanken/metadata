name:
  swe: Svenska kognitiva tester (syntetiska data)
  eng: Swedish cognitive tests (synthetic data)
description:
  swe: Svenska kognitiva tester syftar på en samling neuropsykologiska test som används
    i Sverige för att bedöma olika kognitiva funktioner, ofta vid utredning av exempelvis
    demens eller andra neurologiska tillstånd. Inom detta tema ingår bland annat tester
    som <b>SVF</b> (<i>semantiskt ordflödestest</i>), <b>FAS</b> (<i>fonologiskt ordflödestest</i>)
    och <b>BNT</b> (<i>Boston Naming Test - konfrontationsbenämning</i>). Dessa tester
    mäter olika aspekter av språk och exekutiva funktioner, såsom förmågan att snabbt
    generera ord inom en kategori, producera ord som börjar på specifika bokstäver
    samt förmågan att namnge bilder av objekt. Tillsammans ger de en bred bild av
    individens språkliga och kognitiva förmåga.
  eng: Swedish Cognitive Tests refers to a collection of neuropsychological assessments
    commonly used in Sweden to evaluate cognitive functioning, particularly in clinical
    settings such as dementia or neurological evaluations. This group includes tests
    such as <b>SVF</b> (<i>Semantic Verbal Fluency</i>), <b>FAS</b> (<i>phonemic verbal
    fluency</i>), and the <b>BNT</b> (<i>Boston Naming Test - confrontation naming</i>).
    These assessments measure different aspects of language and executive functioning,
    including the ability to rapidly generate words within a semantic category, produce
    words beginning with specific letters, and name pictured objects. Together, these
    tests provide a broad overview of an individual’s linguistic and cognitive abilities.
short_description:
  swe: Svenska kognitiva tester är en samling neuropsykologiska test som används för
    att bedöma kognitiva funktioner, särskilt språk och exekutiva funktioner.
  eng: Swedish cognitive tests refer to a collection of neuropsychological assessments
    used to evaluate cognitive functions, particularly language and executive functions.
