name:
  swe: 'PGV-PII'  # Human readable name in Swedish
  eng: 'PGV-PII' # Human readable name in English
description:  # Longer description. May contain Markdown or HTML.
  swe: 'Det här är en liten korpus som består av 10 par texter på svenska och engelska, annoterade med kategorier av personliga uppgifter. Annoteringen liknar den av TAB-korpusen (https://aclanthology.org/2022.cl-4.19/). De tjugo texterna har sitt ursprung i Parallel Global Voices-korpusen (https://nlp.ilsp.gr/pgv/, CC BY 4.0) och var annoterade för hand. Denna korpus innehåller data från Global Voices-webbsidorna (https://globalvoices.org/, CC BY 3.0).'  # Longer description in Swedish. May contain Markdown or HTML.
  eng: 'This is a small corpus of 10 pairs of texts in Swedish and English annotated with personal information categories. The annotation largely follows that of the TAB corpus (https://aclanthology.org/2022.cl-4.19/). The twenty texts in total were sourced from the Parallel Global Voices corpus (https://nlp.ilsp.gr/pgv/, CC BY 4.0) and manually annotated. That corpus, in turn, had collected the texts from the Global Voices websites (https://globalvoices.org/, CC BY 3.0).' # Longer description in English. May contain Markdown or HTML.
short_description: # Short description in a few words or a sentence (plain text only)
  swe: 'En liten samling av 10 par parallella texter på svenska och engelska, annoterade med kategorier på personliga uppgifter.'  # Short description in a few words or a sentence in Swedish (plain text only)
  eng: 'A small collection of 10 pairs of parallel texts in Swedish and English annotated with personal information categories.' # Short description in a few words or a sentence in English (plain text only)
