description:
  eng: "<p>\n  <b>The Corpus Voices of the formerly Enslaved (Pilot)</b>\n</p>\n<p>\n\
    \  A corpus of transcribed and annotated narratives from informants who were formerly\
    \ enslaved. Texts are partly in standard English and partly in vernacular English\
    \ [eng]. There are three main parts: \n</p>\n<ul>\n  <li>Selection of narratives\
    \ collected in the Federal Writers' Projct (FWP) collected in late 1930's and\
    \ published in 1941.</li>\n  <li>Selection of narratives collected as part of\
    \ the Documenting the American South Collection (DocSouth)</li>, and thirdly\n\
    \  <li>Songs and narratives collected for the corpus Afro-Diasporic Text Corpus\
    \ Project (AATC).</li>\n</ul>\n<p>\n  The Corpus has been developed in collaboration\
    \ with Språkbanken Text.\n</p>\n<p>\n  <b>For more on annotation, preparation\
    \ of data, and acknowledgements see:</b>\n</p>\n<ul style=\"list-style: unset;\
    \ padding: revert;\">\n  <li>IE, LJO, KR. (202x). Corpus Voices of the formerly\
    \ Enslaved Pilot v0.1. <i>[Where]</i>, pp nn--nn.</li>\n</ul>\n<p>\n  <b>For questions\
    \ about the corpus:</b><br>\n  Klas Rönnbäck <a href=\"mailto:klas.ronnback@econhist.gu.se\"\
    >klas.ronnback@econhist.gu.se</a>\n</p>\n<p>\n  If you notice any errors or inconsistencies\
    \ in annotations, please report them to this email address.\n</p>\n<p>\n  <b>Main\
    \ contributors:</b>\n</p>\n<ul style=\"list-style: unset; padding: revert;\">\n\
    \  <li>Irene Elmerot<br>\n  Researcher, University of Gothenburg</li>\n  <li>Leif-Jöran\
    \ Olsson<br>\n  Senior Research Engineer, University of Gothenburg</li>\n  <li>Klas\
    \ Rönnbäck<br>\n  PI and Senior Researcher, University of Gothenburg</li>\n</ul>"
