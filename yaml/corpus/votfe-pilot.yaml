description:
  eng: |-
    <p>
      <b>The Corpus Voices of the formerly Enslaved (Pilot)</b>
    </p>
    <p>
      A corpus of transcribed and annotated narratives from informants who were formerly enslaved. Texts are partly in standard English and partly in vernacular English [eng]. There are three main parts: 
    </p>
    <ul>
      <li>Selection of narratives collected in the Federal Writers' Projct (FWP) collected in late 1930's and published in 1941.</li>
      <li>Selection of narratives collected as part of the Documenting the American South Collection (DocSouth)</li>, and thirdly
      <li>Songs and narratives collected for the corpus Afro-Diasporic Text Corpus Project (AATC).</li>
    </ul>
    <p>
      The Corpus has been developed in collaboration with Språkbanken Text.
    </p>
    <p>
      <b>For more on annotation, preparation of data, and acknowledgements see:</b>
    </p>
