description:
  swe: |-
    Svensk dramadialog utgörs av 34 hela dramer från perioden 1730 till 1950. Dramerna är utvalda med diakronisk
    jämförbarhet i åtanke, och är så långt det är möjligt svenska originaldramer för vuxna som blivit uppförda och har
    en identifierad författare. Urvalet syftar till att spegla naturligt språk från respektive tidsperiod, man har
    därför i första hand valt samtidsdramatik och undvikit dramer skrivna på vers. Korpusen är framtagen inom
    projektet Svensk dramadialog under tre sekler av Mats Thelander, Görel Bergman-Claeson, Ulla Börestam, Ulla
    Melander Marttala, Siv Strömquist, Marie Sörlin, Kerstin Thelander, Carin Östman, Gun Widmark och Vera Lif, under
    ledning av Mats Thelander. En delmängd av dramerna har annoterats och bearbetats vid framtagningen av korpusen
    Engelsk och svensk dramadialog 1725-1950 (ESDD). Arbetet med ESDD genomfördes av Linnéa Anglemark, Merja Kytö,
    Ulla Melander Martala, Mats Thelander och Sofia Gustafson Capková. Resterande dramer har bearbetats av Astrid
    Berntsson Ingelstam med stöd av Språkbanken CLARIN.
  eng: |-
    Swedish Drama Dialogue consists of 34 complete dramas from the period 1730 to 1950. The dramas were selected with
    diachronic comparability in mind, and are as far as possible Swedish original dramas for adults that have been
    performed and have an identified author. The selection aims to reflect natural language from each time period, so
    contemporary drama has been chosen in the first place and dramas written in verse have been avoided. The corpus
    was created within the project "Svensk dramadialog" across three centuries by Mats Thelander, Görel
    Bergman-Claeson, Ulla Börestam, Ulla Melander Marttala, Siv Strömquist, Marie Sörlin, Kerstin Thelander, Carin
    Östman, Gun Widmark and Vera Lif, under the leadership of Mats Thelander. A subset of the dramas has been
    annotated and processed in the creation of the corpus "Engelsk och svensk dramadialog 1725-1950" (ESDD). The
    work on ESDD was carried out by Linnéa Anglemark, Merja Kytö, Ulla Melander Martala, Mats Thelander and Sofia
    Gustafson Capková. The remaining dramas were processed by Astrid Berntsson Ingelstam with support from Språkbanken
    CLARIN.
