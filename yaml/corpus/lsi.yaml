description:
  eng: |-
    A digital version of the classic Grierson’s <i>Linguistic Survey of India</i> (LSI; 1903-1927) covering more than
    250 varieties representing the four major South Asian language families.
    
    You can read more about the project in [this blog
    post](https://spraakbanken.gu.se/en/blog/20200901-griersons-linguistic-survey-of-india-as-open-access-digital-data-resource-for).
