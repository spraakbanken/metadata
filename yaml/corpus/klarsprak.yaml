name:
  swe: Förvaltningsmyndigheters texter
  eng: Förvaltningsmyndigheters texter
short_description:
  swe: Tjänsteutlåtanden från kansliet för Kommittén för rättighetsfrågor inom Västra Götalandsregionen, insamlade för att jämföra texter före och efter klarspråksprojektet "Lättlästa handlingar".
description:
  swe: |-
    Korpusen skapades i ett pilotprojekt om att studera effekterna av myndigheternas klarspråksarbete.
    
    Materialet består av:
    - 33 tjänstutlåtanden skrivna under perioden april 2011–december 2012, dvs. före det att handläggarna gick utbildningen – totalt 17 147 ord
    - 42 tjänstutlåtanden skrivna efter utbildningen, november 2013–juni 2015 – totalt 29 430 ord
    
    Mer info finns i <a href="https://gup.ub.gu.se/publication/259902?lang=sv" target="_blank">denna artikel</a>.
