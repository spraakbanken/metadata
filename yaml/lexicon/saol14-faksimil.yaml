description:
  swe: |-
    Denna datamängd innehåller uppslagsorden i upplaga 14 (2015) av *Svenska Akademiens ordlista*, SAOL, med länkar till faksimil.

    **ingångsord (normaliserat ord)**: uppslagsord, fetstil i den tryckta upplagan

    **ordklass (UD)**: ordklassuppgift på engelska (universal dependencies)

    **ord**: uppslagsord med ev. homografsiffra

    **homograf**: numrering vid likstavade former av olika ord. 1, 2, 3 osv. betecknar ordning på homografa ord. Exempelord: **rå**, **så**

    **morfosyntax**: vanligen ordklassangivelse (förkortning), ibland information om att ordet är en hänvisning (hv), ibland böjningsformer

    (**relation**: [vi föreslår attdetta fält undertrycks])

    **relaterat ord**: uppslagsordets ordledsindelning med stort resp. litet lodstreck

    **källa**: länk till pdf av aktuell sida i tryckt upplaga

    **text**: böjningsändelser, böjda former. Exempelord: +n, koalor vid sökning på **koala**
