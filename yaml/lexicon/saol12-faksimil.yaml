description:
  swe: |-
    Denna datamängd innehåller uppslagsorden i upplaga 12 (1998) av *Svenska Akademiens ordlista*, SAOL, med länkar till faksimil.

    **ingångsord (normaliserat ord)**: uppslagsord, fetstil i den tryckta upplagan

    **ordklass (UD)**: ordklassuppgift på engelska (universal dependencies)

    **ord**: uppslagsord med ev. homografsiffra

    **homograf**: numrering vid likstavade former av olika ord. 1, 2, 3 osv. betecknar ordning påhomografa ord. Exempelord: **rå**, **så**

    **morfosyntax**: vanligen ordklassangivelse (förkortning), ibland information om att ordet är en hänvisning (hv)

    **relaterat ord**: aktuellt uppslagsord

    **källa**: länk till pdf av aktuell sida i tryckt upplaga
