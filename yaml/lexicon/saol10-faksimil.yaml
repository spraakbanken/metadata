description:
  swe: |-
    Denna datamängd innehåller uppslagsorden i upplaga 10 (1973) av *Svenska Akademiens ordlista*, SAOL, med länkar till faksimil.

    **ingångsord (normaliserat ord)**: uppslagsord, fetstil i den tryckta upplagan

    **ordklass (UD)**: ordklassuppgift på engelska (universal dependencies)

    **ord**: uppslagsord med ev. homografsiffra; ev. lodstreck markerar stor ordledsgräns

    **homograf**: numrering vid likstavade former av olika ord. 1, 2, 3 osv. betecknar ordning på homografa ord. Exempelord: **rå**, **så**

    **morfosyntax**: ordklassangivelse (förkortning), OBS att inte alla sammansättningar har ordklassangivelse

    **relaterat ord**: huvudord i aktuellt näste med ev. homografsiffra

    **källa**: länk till pdf av aktuell sida i tryckt upplaga
